name: Trigger Daily Reminders

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  trigger-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduler endpoint
      run: |
        curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SCHEDULER_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.RENDER_APP_URL }}/api/admin/trigger_reminders"
